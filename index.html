<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>光子盘点</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
#cameraWrap{position:absolute;inset:0;background:#000;touch-action:none}
#cameraStage{width:100%;height:100%;overflow:hidden;position:relative}
#video{width:100%;height:100%;object-fit:contain;transform-origin:center center;will-change:transform}
#focusBox{position:absolute;width:240px;height:160px;border:2px solid rgba(255,255,255,0.9);border-radius:8px;pointer-events:auto;touch-action:none;box-shadow:0 0 0 9999px rgba(0,0,0,0.35)}
.focusCorner{position:absolute;width:20px;height:20px;border:3px solid #4FC3F7;border-radius:2px}
.focusCorner.tl{top:-3px;left:-3px;border-right:none;border-bottom:none}
.focusCorner.tr{top:-3px;right:-3px;border-left:none;border-bottom:none}
.focusCorner.bl{bottom:-3px;left:-3px;border-right:none;border-top:none}
.focusCorner.br{bottom:-3px;right:-3px;border-left:none;border-top:none}
.gridLine{position:absolute;background:rgba(255,255,255,0.25);pointer-events:none}
.gridLine.h1{left:0;right:0;top:33.3%;height:1px}
.gridLine.h2{left:0;right:0;top:66.6%;height:1px}
.gridLine.v1{top:0;bottom:0;left:33.3%;width:1px}
.gridLine.v2{top:0;bottom:0;left:66.6%;width:1px}
#captureBtn{position:fixed;bottom:calc(30px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);width:88px;height:88px;border-radius:50%;border:4px solid rgba(255,255,255,.8);background:linear-gradient(180deg,#3a3a3a,#1a1a1a);color:#fff;font-size:36px;z-index:9999;transition:transform .1s}
#captureBtn:active{transform:translateX(-50%) scale(0.9)}
#captureBtn.disabled{opacity:0.4;pointer-events:none}
.top-btns{position:fixed;top:env(safe-area-inset-top,10px);left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;z-index:100;background:rgba(0,0,0,.4);backdrop-filter:blur(10px)}
.top-btns button{background:transparent;color:#fff;border:none;font-size:22px;min-width:44px;min-height:44px}
#categoryDisplay{background:rgba(0,0,0,.5);backdrop-filter:blur(15px);color:#fff;font-size:24px;font-weight:600;padding:8px 24px;border-radius:30px;border:1px solid rgba(255,255,255,.2)}
#countTip{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:28px;font-weight:600;padding:8px 20px;border-radius:20px;display:none;z-index:9999}
#flashOverlay{position:fixed;inset:0;background:#fff;z-index:8000;pointer-events:none;opacity:0;transition:opacity .15s}
#flashOverlay.flash{opacity:0.9;transition:none}
#zoomIndicator{position:fixed;bottom:calc(130px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:14px;padding:4px 12px;border-radius:12px;z-index:9999;display:none}
#thumbPreview{position:fixed;bottom:calc(140px + env(safe-area-inset-bottom,0px));right:20px;width:100px;height:75px;border-radius:8px;border:2px solid rgba(255,255,255,.6);overflow:hidden;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
#thumbPreview img{width:100%;height:100%;object-fit:cover}
#thumbPreview.show{opacity:1}
#resInfo{position:fixed;top:calc(56px + env(safe-area-inset-top,10px));left:12px;color:rgba(255,255,255,.6);font-size:11px;z-index:100;background:rgba(0,0,0,.3);padding:2px 8px;border-radius:8px}
#focusIndicator{position:absolute;width:60px;height:60px;border:2px solid #4FC3F7;border-radius:50%;pointer-events:none;opacity:0;transition:opacity .3s}
#focusIndicator.show{opacity:1}
#previewPanel{position:fixed;inset:0;background:#000;z-index:2000;display:none;flex-direction:column;color:#fff}
#previewHeader{padding:8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333}
#previewList{flex:1;overflow-y:auto;padding:6px}
.previewItem{display:flex;align-items:center;gap:8px;background:#111;padding:6px;border-radius:6px;margin-bottom:6px}
.previewItem img{width:56px;height:42px;object-fit:cover;border-radius:4px;cursor:pointer}
.previewInfo{flex:1;font-size:13px}
.previewDeleteBtn{background:#dc3545;border:none;color:#fff;padding:6px 8px;border-radius:6px;font-size:12px}
#imagePreviewOverlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:3000;display:none;justify-content:center;align-items:center}
#imagePreviewOverlay img{max-width:100%;max-height:100%;object-fit:contain}
#imagePreviewOverlay .closeBtn{position:absolute;top:20px;right:20px;color:#fff;font-size:30px;background:none;border:none}
#exportProgress{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:5000;display:none;justify-content:center;align-items:center;flex-direction:column;color:#fff;font-size:18px}
#exportProgress .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
#exportProgress .progress-text{margin-top:8px;font-size:14px;color:#aaa}
</style>
</head>
<body>
<div id="cameraWrap">
  <div id="cameraStage">
    <video id="video" autoplay playsinline muted></video>
    <div id="focusIndicator"></div>
    <div id="focusBox">
      <div class="gridLine h1"></div>
      <div class="gridLine h2"></div>
      <div class="gridLine v1"></div>
      <div class="gridLine v2"></div>
      <div class="focusCorner tl"></div>
      <div class="focusCorner tr"></div>
      <div class="focusCorner bl"></div>
      <div class="focusCorner br"></div>
    </div>
  </div>
</div>
<div class="top-btns">
  <button id="clearBtn">🗑</button>
  <button id="exportBtn">📤</button>
  <div id="categoryDisplay">床架</div>
  <button id="previewBtn">📋</button>
</div>
<button id="captureBtn">📸</button>
<div id="countTip">📦 0</div>
<div id="resInfo"></div>
<div id="zoomIndicator">1.0x</div>
<div id="thumbPreview"><img src="" alt=""></div>
<div id="flashOverlay"></div>
<div id="previewPanel">
  <div id="previewHeader"><strong>清单预览</strong><div id="previewCount">共 0 件</div><button onclick="closePreview()" style="background:none;border:none;color:#fff;font-size:18px;">✕</button></div>
  <div id="previewList"></div>
</div>
<div id="imagePreviewOverlay">
  <button class="closeBtn">✕</button>
  <img id="previewImageLarge" src="" alt="">
</div>
<div id="exportProgress">
  <div class="spinner"></div>
  <div>正在生成表格...</div>
  <div class="progress-text" id="exportProgressText">0 / 0</div>
</div>
<script>
const CATEGORIES=["床架","床垫","沙发","床头柜","餐桌","小件"];
let records=[],currentCategory="床架",isSaving=false,scale=1,translateX=0,translateY=0;
let dbPromise=null,stream=null;
const video=document.getElementById("video"),cameraStage=document.getElementById("cameraStage"),focusBox=document.getElementById("focusBox");

function getDB(){if(dbPromise)return dbPromise;dbPromise=new Promise((res,rej)=>{const r=indexedDB.open("PhotonDB",1);r.onupgradeneeded=e=>e.target.result.createObjectStore("records",{keyPath:"id",autoIncrement:true});r.onsuccess=()=>res(r.result)});return dbPromise;}
async function saveToDB(rec){try{const db=await getDB();return new Promise((resolve,reject)=>{const tx=db.transaction("records","readwrite");const req=tx.objectStore("records").add(rec);req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}catch(e){console.error("saveToDB error:",e)}}
async function deleteFromDB(id){try{const db=await getDB();return new Promise((resolve,reject)=>{const tx=db.transaction("records","readwrite");const req=tx.objectStore("records").delete(id);req.onsuccess=()=>resolve();req.onerror=()=>reject(req.error)})}catch(e){console.error("deleteFromDB error:",e)}}
async function clearDB(){try{const db=await getDB();return new Promise((resolve,reject)=>{const tx=db.transaction("records","readwrite");const req=tx.objectStore("records").clear();req.onsuccess=()=>resolve();req.onerror=()=>reject(req.error)})}catch(e){console.error("clearDB error:",e)}}
async function loadFromDB(){try{const db=await getDB();return new Promise((resolve,reject)=>{const tx=db.transaction("records","readonly");const req=tx.objectStore("records").getAll();req.onsuccess=()=>resolve(req.result||[]);req.onerror=()=>reject(req.error)})}catch(e){console.error("loadFromDB error:",e);return[]}}

// 摄像头初始化：请求最高分辨率 + 连续对焦 + 连续曝光
async function initCamera(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    document.body.innerHTML='<div style="color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;font-size:16px;line-height:1.6">摄像头不可用<br>请使用 HTTPS 环境或 localhost 访问</div>';return;
  }
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:"environment",
        width:{ideal:3840},
        height:{ideal:2160},
        advanced:[
          {focusMode:"continuous"},
          {exposureMode:"continuous"},
          {whiteBalanceMode:"continuous"}
        ]
      }
    });
    video.srcObject=stream;video.play();
    // 显示实际分辨率
    video.addEventListener("loadedmetadata",()=>{
      const track=stream.getVideoTracks()[0];
      const settings=track.getSettings();
      const w=settings.width||video.videoWidth,h=settings.height||video.videoHeight;
      document.getElementById("resInfo").innerText=`${w}×${h} HD`;
    });
  }catch(err){
    // 降级：尝试 1080p
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1920},height:{ideal:1080}}});
      video.srcObject=stream;video.play();
      video.addEventListener("loadedmetadata",()=>{
        document.getElementById("resInfo").innerText=`${video.videoWidth}×${video.videoHeight}`;
      });
    }catch(err2){
      let msg="摄像头启动失败";
      if(err2.name==='NotAllowedError')msg="摄像头权限被拒绝，请在浏览器设置中允许访问摄像头";
      else if(err2.name==='NotFoundError')msg="未检测到摄像头设备";
      else if(err2.name==='NotReadableError')msg="摄像头被其他应用占用";
      else msg="摄像头错误："+err2.message;
      document.body.innerHTML=`<div style="color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;font-size:16px;line-height:1.6">${msg}</div>`;
    }
  }
}
initCamera();
loadFromDB().then(data=>{if(data.length){records=data.sort((a,b)=>(b.id||0)-(a.id||0));const t=document.getElementById("countTip");t.innerText=`📦 ${records.length}`;}}).catch(e=>console.error("加载历史数据失败:",e));

focusBox.style.left="50%";focusBox.style.top="50%";focusBox.style.transform="translate(-50%, -50%)";

// 双指缩放
let lastDist=0,lastCenter={x:0,y:0};
const zoomIndicator=document.getElementById("zoomIndicator");
function updateZoomDisplay(){zoomIndicator.innerText=scale.toFixed(1)+"x";zoomIndicator.style.display="block";clearTimeout(zoomIndicator._timer);zoomIndicator._timer=setTimeout(()=>zoomIndicator.style.display="none",1500)}

cameraStage.addEventListener("pointerdown",e=>{if(e.pointerType==="touch"&&e.touches?.length===2){lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);lastCenter={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2}}});
cameraStage.addEventListener("pointermove",e=>{if(e.pointerType==="touch"&&e.touches?.length===2){const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(lastDist<=0){lastDist=dist;return}const center={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};scale*=dist/lastDist;scale=Math.max(1,Math.min(scale,6));translateX+=center.x-lastCenter.x;translateY+=center.y-lastCenter.y;lastDist=dist;lastCenter=center;video.style.transform=`translate(${translateX}px, ${translateY}px) scale(${scale})`;updateZoomDisplay()}});

// 点击对焦
const focusIndicator=document.getElementById("focusIndicator");
let tapTimer=null;
cameraStage.addEventListener("pointerdown",e=>{
  if(e.target.closest("#focusBox"))return; // 点对焦框不触发
  if(e.pointerType==="touch"&&e.touches&&e.touches.length>1)return; // 多指不触发
  // 延迟检测：区分点击和拖动
  const startX=e.clientX,startY=e.clientY;
  tapTimer=setTimeout(()=>{
    const stageRect=cameraStage.getBoundingClientRect();
    focusIndicator.style.left=(startX-stageRect.left-30)+"px";
    focusIndicator.style.top=(startY-stageRect.top-30)+"px";
    focusIndicator.classList.add("show");
    // 尝试通过 MediaStreamTrack 设置对焦区域
    try{
      if(stream){
        const track=stream.getVideoTracks()[0];
        const caps=track.getCapabilities();
        if(caps.focusMode){
          track.applyConstraints({advanced:[{focusMode:"continuous",focusPoint:{x:0.5,y:0.5}}]});
        }
      }
    }catch(_){}
    setTimeout(()=>focusIndicator.classList.remove("show"),800);
  },120);
});
cameraStage.addEventListener("pointermove",e=>{if(tapTimer){const dx=Math.abs(e.clientX-e.clientX),dy=0;if(Math.hypot(dx,dy)>10){clearTimeout(tapTimer);tapTimer=null}}});
cameraStage.addEventListener("pointerup",()=>{tapTimer=null});

// 对焦框拖动
let draggingFocus=false;
focusBox.addEventListener("pointerdown",e=>{draggingFocus=true;e.preventDefault();e.stopPropagation()});
window.addEventListener("pointermove",e=>{if(!draggingFocus)return;const r=cameraStage.getBoundingClientRect();let x=e.clientX-r.left-focusBox.offsetWidth/2,y=e.clientY-r.top-focusBox.offsetHeight/2;x=Math.max(0,Math.min(x,r.width-focusBox.offsetWidth));y=Math.max(0,Math.min(y,r.height-focusBox.offsetHeight));focusBox.style.left=x+"px";focusBox.style.top=y+"px";focusBox.style.transform="none"});
window.addEventListener("pointerup",()=>draggingFocus=false);

document.getElementById("categoryDisplay").onclick=()=>{let i=CATEGORIES.indexOf(currentCategory)+1;currentCategory=CATEGORIES[i>=CATEGORIES.length?0:i];categoryDisplay.innerText=currentCategory};

// 图像锐化滤波（卷积核增强文字边缘）
function sharpenImage(ctx,w,h){
  const src=ctx.getImageData(0,0,w,h);
  const dst=ctx.createImageData(w,h);
  const s=src.data,d=dst.data;
  // 锐化卷积核：中心5，四邻-1
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      if(x===0||x===w-1||y===0||y===h-1){
        d[i]=s[i];d[i+1]=s[i+1];d[i+2]=s[i+2];d[i+3]=s[i+3];continue;
      }
      for(let c=0;c<3;c++){
        const v=5*s[i+c]-s[i-4+c]-s[i+4+c]-s[i-w*4+c]-s[i+w*4+c];
        d[i+c]=Math.max(0,Math.min(255,v));
      }
      d[i+3]=s[i+3];
    }
  }
  ctx.putImageData(dst,0,0);
}

// 闪光动画 + 震动反馈
function triggerFlash(){
  const flash=document.getElementById("flashOverlay");
  flash.classList.add("flash");
  requestAnimationFrame(()=>{flash.classList.remove("flash")});
  if(navigator.vibrate)navigator.vibrate(30);
}

// 缩略图预览
function showThumbPreview(imgSrc){
  const thumb=document.getElementById("thumbPreview");
  thumb.querySelector("img").src=imgSrc;
  thumb.classList.add("show");
  clearTimeout(thumb._timer);
  thumb._timer=setTimeout(()=>thumb.classList.remove("show"),3000);
}

// 拍照
document.getElementById("captureBtn").addEventListener("pointerdown",async e=>{
  e.preventDefault();if(isSaving)return;isSaving=true;
  const btn=document.getElementById("captureBtn");btn.classList.add("disabled");
  // 检查视频是否就绪
  if(!video.videoWidth||!video.videoHeight){isSaving=false;btn.classList.remove("disabled");return alert("摄像头未就绪，请稍后再试")}
  // 防抖：短暂等待让画面稳定
  await new Promise(r=>setTimeout(r,150));
  const vr=video.getBoundingClientRect(),fr=focusBox.getBoundingClientRect();
  // 缩放感知：根据 video 的 CSS transform 计算实际显示区域
  const vw=vr.width,vh=vr.height;
  // 计算对焦框在视频实际像素中的位置（考虑缩放变换）
  let sx=Math.max(0,(fr.left-vr.left)/vw*video.videoWidth);
  let sy=Math.max(0,(fr.top-vr.top)/vh*video.videoHeight);
  let sw=fr.width/vw*video.videoWidth;
  let sh=fr.height/vh*video.videoHeight;
  // 如果有缩放，调整截取区域
  if(scale>1){
    // 缩放后视频显示更大，截取区域需要映射回原始视频
    const cx=video.videoWidth/2,cy=video.videoHeight/2;
    // 对焦框中心在视频坐标系中的位置
    const fcx=sx+sw/2,fcy=sy+sh/2;
    // 映射回原始视频坐标
    sx=fcx-sw/2/scale;sy=fcy-sh/2/scale;
    sw=sw/scale;sh=sh/scale;
  }
  sx=Math.max(0,sx);sy=Math.max(0,sy);
  sw=Math.min(sw,video.videoWidth-sx);sh=Math.min(sh,video.videoHeight-sy);
  if(sw<=0||sh<=0){isSaving=false;btn.classList.remove("disabled");return alert("对焦框位置无效，请调整后重试")}
  // 闪光
  triggerFlash();
  // 2倍超分辨率捕获
  const SUPER_RES=2;
  const c=document.createElement("canvas");
  c.width=Math.round(sw*SUPER_RES);c.height=Math.round(sh*SUPER_RES);
  const ctx=c.getContext("2d");
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high";
  ctx.drawImage(video,sx,sy,sw,sh,0,0,c.width,c.height);
  // 图像锐化增强文字清晰度
  sharpenImage(ctx,c.width,c.height);
  const hdImg=c.toDataURL("image/jpeg",1.0);
  // 保存记录
  const seq=String(Date.now()).slice(-4);
  const rec={time:new Date().toLocaleString(),model:`${currentCategory}-${seq}`,category:currentCategory,image:hdImg};
  const dbId=await saveToDB(rec);
  rec.id=dbId;
  records.unshift(rec);
  // 缩略图预览
  showThumbPreview(hdImg);
  const t=document.getElementById("countTip");t.innerText=`📦 ${records.length}`;t.style.display="block";setTimeout(()=>t.style.display="none",800);
  isSaving=false;btn.classList.remove("disabled");
});

document.getElementById("previewBtn").onclick=()=>{renderPreview();document.getElementById("previewPanel").style.display="flex"}
function closePreview(){document.getElementById("previewPanel").style.display="none"}
function renderPreview(){
  const l=document.getElementById("previewList"),c=document.getElementById("previewCount");l.innerHTML="";c.innerText=`共 ${records.length} 件`;
  records.forEach((r,i)=>{const d=document.createElement("div");d.className="previewItem";d.innerHTML=`<img src="${r.image}"><div class="previewInfo"><div>${r.category} - ${r.model}</div><div>${r.time}</div></div><button class="previewDeleteBtn" data-i="${i}">🗑</button>`;l.appendChild(d)});
  l.querySelectorAll('.previewItem img').forEach(img=>img.onclick=()=>{document.getElementById('previewImageLarge').src=img.src;document.getElementById('imagePreviewOverlay').style.display='flex'});
  l.querySelectorAll('.previewDeleteBtn').forEach(b=>b.onclick=async()=>{if(!confirm("确定删除这条记录吗？"))return;const idx=parseInt(b.dataset.i);const rec=records[idx];if(rec&&rec.id!==undefined){await deleteFromDB(rec.id)}records.splice(idx,1);renderPreview()});
}

document.querySelector('#imagePreviewOverlay .closeBtn').onclick=()=>document.getElementById('imagePreviewOverlay').style.display='none';
document.getElementById('imagePreviewOverlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.style.display='none'};

document.getElementById("clearBtn").onclick=async()=>{if(confirm("确定清空所有记录？")){records=[];await clearDB();const t=document.getElementById("countTip");t.innerText=`📦 0`;t.style.display="block";setTimeout(()=>t.style.display="none",800);}};

document.getElementById("exportBtn").onclick=async function(){
  if(!records.length)return alert("无数据");
  const btn=this;btn.disabled=true;
  const progressEl=document.getElementById("exportProgress");
  const progressText=document.getElementById("exportProgressText");
  progressEl.style.display="flex";
  progressText.innerText=`0 / ${records.length}`;

  try{
    const d=new Date().toLocaleDateString().replace(/\//g,""),fn=`极速表格_${d}`;
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet("盘点清单",{views:[{state:"frozen",ySplit:1}]});
    ws.columns=[
      {header:"序号",key:"index",width:8},
      {header:"时间",key:"time",width:22},
      {header:"类别",key:"category",width:12},
      {header:"名称",key:"model",width:18},
      {header:"图片",key:"image",width:52}
    ];
    const headerRow=ws.getRow(1);headerRow.height=28;
    headerRow.eachCell(cell=>{
      cell.font={bold:true,size:12,color:{argb:"FFFFFFFF"}};
      cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF4472C4"}};
      cell.alignment={vertical:"middle",horizontal:"center"};
      cell.border={top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};
    });
    const IMG_ROW_HEIGHT=200;
    for(let i=0;i<records.length;i++){
      const r=records[i];const rowNum=i+2;
      const row=ws.addRow({index:i+1,time:r.time,category:r.category,model:r.model});
      row.height=IMG_ROW_HEIGHT;
      row.eachCell(cell=>{cell.alignment={vertical:"middle",horizontal:"center"};cell.border={top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};cell.font={size:11}});
      if(r.image){
        try{
          const base64Data=r.image.split(",")[1];
          const imageId=wb.addImage({base64:base64Data,extension:"jpeg"});
          ws.addImage(imageId,{tl:{col:4.02,row:rowNum-1+0.02},br:{col:4.98,row:rowNum-0.02},editAs:"oneCell"});
        }catch(imgErr){ws.getCell(rowNum,5).value="[图片加载失败]"}
      }
      progressText.innerText=`${i+1} / ${records.length}`;
      if(i%5===0)await new Promise(r=>setTimeout(r,0));
    }
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    saveAs(blob,`${fn}.xlsx`);
    progressEl.style.display="none";btn.disabled=false;
    alert("导出成功！Excel表格已包含所有图片。");
  }catch(err){
    console.error(err);progressEl.style.display="none";btn.disabled=false;
    alert("导出失败："+err.message);
  }
};
</script>
</body>
</html>
